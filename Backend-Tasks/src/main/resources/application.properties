# ==========================================
# 1. CONFIGURACI”N DEL SERVIDOR Y DEVTOOLS
# ==========================================
server.port=8080
# Tiempo de espera para que DevTools no reinicie demasiado r·pido mientras escribes
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s

# ==========================================
# 2. CONEXI”N A POSTGRESQL
# ==========================================
# Cambia 'tasks_db', 'tu_usuario' y 'tu_pass' por tus datos reales
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# 3. FLYWAY (El que CREA las tablas)
# ==========================================
spring.flyway.enabled=true
# Esto permite que Flyway empiece desde cero si la DB ya tiene algo
spring.flyway.baseline-on-migrate=true
# UbicaciÛn de tus scripts .sql (V1__nombre.sql)
spring.flyway.locations=classpath:db/migration

# ==========================================
# 4. JPA / HIBERNATE (El que VALIDA)
# ==========================================
# IMPORTANTE: Usamos 'validate' porque Flyway manda sobre el SQL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# 5. SEGURIDAD JWT (Para tus Services)
# ==========================================
# Usa una clave de al menos 32 caracteres (puedes cambiarla luego)
application.security.jwt.secret-key=${secret}
# ExpiraciÛn de 24 horas (en milisegundos)
application.security.jwt.expiration=86400000